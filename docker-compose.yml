services:
  postgres:
    image: postgres:16-alpine
    container_name: biopet-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-biopet_db}
      POSTGRES_USER: ${DB_USER:-biopet_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-biopet_pass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-biopet_user} -d ${DB_NAME:-biopet_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: biopet-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./Backend
    container_name: biopet-backend
    env_file: .env
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep UP || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10

  frontend:
    build: ./frontend
    container_name: biopet-frontend
    ports:
      - "4200:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5

volumes:
  postgres_data:
